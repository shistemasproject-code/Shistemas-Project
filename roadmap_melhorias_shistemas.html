<style>
.rm-section{margin-bottom:2rem}
.rm-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:.5px solid var(--color-border-tertiary)}
.rm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.rm-card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;cursor:pointer;transition:border-color .15s}
.rm-card:hover{border-color:var(--color-border-primary)}
.rm-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:.5rem}
.rm-icon{font-size:20px;flex-shrink:0}
.rm-price{font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--border-radius-md);white-space:nowrap}
.price-green{background:var(--color-background-success);color:var(--color-text-success)}
.price-blue{background:var(--color-background-info);color:var(--color-text-info)}
.price-amber{background:var(--color-background-warning);color:var(--color-text-warning)}
.rm-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:.3rem}
.rm-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.rm-effort{font-size:11px;color:var(--color-text-tertiary);margin-top:.5rem;display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-easy{background:#639922}
.dot-med{background:#BA7517}
.dot-hard{background:#E24B4A}
.detail-box{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-top:1.5rem;display:none}
.detail-box.open{display:block}
.detail-title{font-size:15px;font-weight:500;margin-bottom:.75rem;color:var(--color-text-primary)}
.detail-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:.75rem}
.detail-item{flex:1;min-width:140px}
.detail-item-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.detail-item-val{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.detail-steps{font-size:12px;color:var(--color-text-secondary);line-height:1.8;border-top:.5px solid var(--color-border-tertiary);padding-top:.75rem;margin-top:.5rem}
.rm-cta{display:inline-block;margin-top:.75rem;font-size:12px;color:var(--color-text-info);cursor:pointer}
</style>

function renderCard(item, id){
  return `<div class="rm-card" onclick="openDetail(${JSON.stringify(id)})">
    <div class="rm-card-top">
      <span class="rm-icon">${item.icon}</span>
      <span class="rm-price ${item.priceClass}">${item.price}</span>
    </div>
    <div class="rm-title">${item.title}</div>
    <div class="rm-desc">${item.desc}</div>
    <div class="rm-effort"><span class="dot ${item.effortClass}"></span>${item.effort}</div>
  </div>`;
}

let allItems = {};
['alta','media','longa'].forEach(cat => {
  items[cat].forEach((item, i) => {
    const id = cat+'-'+i;
    allItems[id] = item;
    document.getElementById('grid-'+cat).insertAdjacentHTML('beforeend', renderCard(item, id));
  });
});

function openDetail(id){
  const item = allItems[id];
  const box = document.getElementById('detail-box');
  document.getElementById('detail-title').textContent = item.icon + ' ' + item.title;
  document.getElementById('detail-row').innerHTML = `
    <div class="detail-item"><div class="detail-item-label">Valor a cobrar</div><div class="detail-item-val">${item.valor}</div></div>
    <div class="detail-item"><div class="detail-item-label">Tempo de impl.</div><div class="detail-item-val">${item.tempo}</div></div>
  `;
  document.getElementById('detail-steps').textContent = item.como;
  document.getElementById('detail-prompt').value = item.prompt;
  box.classList.add('open');
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
}
</script>
